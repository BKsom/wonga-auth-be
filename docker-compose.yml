version: '3.8'

services:
  auth-db:
    image: postgres:16-alpine
    container_name: wonga-auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-db:
    image: postgres:16-alpine
    container_name: wonga-user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: src/Services/Auth/Auth.API/Dockerfile
    container_name: wonga-auth-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__AuthDatabase=Host=auth-db;Port=5432;Database=auth_db;Username=postgres;Password=postgres123
      - JwtSettings__SecretKey=WongaAuthSuperSecretKey2024MustBe32CharactersLong!
      - JwtSettings__Issuer=WongaAuth
      - JwtSettings__Audience=WongaAuth
      - JwtSettings__ExpiryMinutes=60
      - Services__UserService=http://user-service:8080
    ports:
      - "5001:8080"
    depends_on:
      auth-db:
        condition: service_healthy
      user-service:
        condition: service_started

  user-service:
    build:
      context: .
      dockerfile: src/Services/User/User.API/Dockerfile
    container_name: wonga-user-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__UserDatabase=Host=user-db;Port=5432;Database=user_db;Username=postgres;Password=postgres123
      - JwtSettings__SecretKey=WongaAuthSuperSecretKey2024MustBe32CharactersLong!
      - JwtSettings__Issuer=WongaAuth
      - JwtSettings__Audience=WongaAuth
      - JwtSettings__ExpiryMinutes=60
    ports:
      - "5002:8080"
    depends_on:
      user-db:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
    container_name: wonga-api-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5000:8080"
    depends_on:
      - auth-service
      - user-service

volumes:
  auth-db-data:
  user-db-data:
